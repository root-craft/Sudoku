<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Sudoku</h1>
      <span class="date" id="date"></span>
    </header>

    <div class="controls-top">
      <div class="difficulty-tabs">
        <button data-difficulty="easy" class="active">Easy</button>
        <button data-difficulty="medium">Medium</button>
        <button data-difficulty="hard">Hard</button>
      </div>
      <div class="timer" id="timer">
        <span id="timer-display">0:00</span>
        <button id="pause-btn" title="Pause">⏸</button>
      </div>
      <div class="controls-right">
        <button class="icon-btn" id="new-btn" title="New Game">⟳</button>
        <button class="icon-btn" id="settings-btn" title="Settings">⚙</button>
        <div class="dropdown">
          <button class="icon-btn" id="menu-btn" title="More">•••</button>
          <div class="dropdown-menu" id="menu-dropdown">
            <button id="hint-btn">💡 Hint</button>
            <button id="check-cell-btn">✓ Check cell</button>
            <button id="check-puzzle-btn">✓ Check puzzle</button>
            <hr style="border: none; border-top: 1px solid var(--border); margin: 4px 0;">
            <button id="reveal-cell-btn">👁 Reveal cell</button>
            <button id="reveal-puzzle-btn">👁 Reveal puzzle</button>
            <hr style="border: none; border-top: 1px solid var(--border); margin: 4px 0;">
            <button id="reset-btn" class="danger">↺ Reset puzzle</button>
          </div>
        </div>
      </div>
    </div>

    <div class="main-layout">
      <div class="grid-wrapper">
        <div id="grid"></div>
        <div class="paused-overlay" id="paused-overlay">Paused — click to resume</div>
      </div>

      <div class="sidebar">
        <div class="mode-toggle">
          <button class="active" data-mode="normal">Normal</button>
          <button data-mode="candidate">Notes</button>
        </div>

        <div class="numpad">
          <button data-num="1">1</button>
          <button data-num="2">2</button>
          <button data-num="3">3</button>
          <button data-num="4">4</button>
          <button data-num="5">5</button>
          <button data-num="6">6</button>
          <button data-num="7">7</button>
          <button data-num="8">8</button>
          <button data-num="9">9</button>
        </div>

        <div class="action-buttons">
          <button id="clear-btn">✕ Clear</button>
          <button id="undo-btn">↩ Undo</button>
        </div>

        <label class="checkbox-option">
          <input type="checkbox" id="auto-candidate"> Auto notes
        </label>

        <div class="error-counter" id="error-counter">
          Errors: <span id="error-count">0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="win-modal">
    <div class="modal win-modal">
      <div class="icon">✓</div>
      <h2>Puzzle solved!</h2>
      <p class="stats" id="win-stats"></p>
      <button id="next-puzzle-btn">Play next puzzle</button>
    </div>
  </div>

  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2>Settings</h2>
      <div class="settings-group">
        <h3>Gameplay</h3>
        <div class="settings-list">
          <label class="checkbox-option">
            <input type="checkbox" id="setting-checkGuesses"> Show wrong entries
          </label>
          <label class="checkbox-option">
            <input type="checkbox" id="setting-autoCandidate" checked> Auto notes mode
          </label>
          <label class="checkbox-option">
            <input type="checkbox" id="setting-showErrorCounter"> Show error counter
          </label>
          <label class="checkbox-option">
            <input type="checkbox" id="setting-showTimer" checked> Show timer
          </label>
        </div>
      </div>
      <div class="settings-group">
        <h3>Highlighting</h3>
        <div class="settings-list">
          <label class="checkbox-option">
            <input type="checkbox" id="setting-highlightConflicts" checked> Highlight conflicts
          </label>
          <label class="checkbox-option">
            <input type="checkbox" id="setting-highlightRowCol" checked> Highlight row/column
          </label>
          <label class="checkbox-option">
            <input type="checkbox" id="setting-highlightBox" checked> Highlight box
          </label>
          <label class="checkbox-option">
            <input type="checkbox" id="setting-highlightIdentical" checked> Highlight identical numbers
          </label>
        </div>
      </div>
      <button id="close-settings">Done</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
